description: "Demand-Supply Matcher — Promptfoo eval suite"

providers:
  - id: openrouter:openai/gpt-4o
    config:
      temperature: 0

tests:
  - description: "ROLE-01 skill match produces ranked output"
    vars:
      role_id: ROLE-01
    assert:
      - type: contains
        value: "skill_match"
  - description: "ROLE-02 returns at least one candidate"
    vars:
      role_id: ROLE-02
    assert:
      - type: contains
        value: "candidates"
